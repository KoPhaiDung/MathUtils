name: Java CI with Maven and JaCoCo

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy code về
        uses: actions/checkout@v3

      - name: Cài đặt JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Chạy Build, Test và JaCoCo Check
        # Lệnh 'verify' sẽ kích hoạt jacoco-check. Nếu coverage < 80%, lệnh này sẽ fail.
        run: mvn clean verify

      - name: Lưu trữ báo cáo JaCoCo (Upload Artifact)
        uses: actions/upload-artifact@v3
        # Sử dụng if: always() để đảm bảo báo cáo vẫn được lưu lại ngay cả khi bước Build báo fail do không đủ coverage
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/