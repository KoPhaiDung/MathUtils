on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name : đưa mã nguồn cho máy ảo trên github
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package
